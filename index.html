<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0066CC" />
  <meta name="description" content="VIVO - Biblia para jóvenes con IA pastoral responsable" />
  <title>VIVO — Biblia para Jóvenes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: Arial, sans-serif; 
      background: #0066CC; 
      color: white; 
      overflow-x: hidden; 
    }
    #root { min-height: 100vh; }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0066CC;
      color: white;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <div class="spinner"></div>
      <h1 style="font-weight: 600; font-size: 2em; margin-bottom: 8px;">VIVO</h1>
      <p style="opacity: 0.8;">Cargando la Palabra de Dios...</p>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
